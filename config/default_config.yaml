retrieval:
  use_selective_retrieval: true
  similarity_top_k: 1
  dense_model_id: "sentence-transformers/all-MiniLM-L6-v2"

agent:
  max_iterations: 1  # Reduced to save LLM calls
  refinement_enabled: true
  abstention_enabled: true
  enable_thought: false  # Disable to save LLM calls (thought generation)

grounding:
  relevance_threshold: 0.4
  consistency_threshold: 0.4
  use_llm_for_contradiction: false  # Can disable to save calls
  
llm:
  provider: "ollama"
  model_name: "llama3.2:1b"  # Local model
  temperature: 0.0
  enable_rate_limiting: false # Not needed for local
  use_cache: true
  rate_limit_calls: 100
  rate_limit_window: 60.0
